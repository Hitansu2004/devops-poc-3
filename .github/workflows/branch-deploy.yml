name: Branch-Based Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test — runs on ALL branches
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: my-app

      - name: Run Unit Tests
        run: mvn test
        working-directory: my-app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar-${{ github.ref_name }}-${{ github.run_number }}
          path: my-app/target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to DEV — only on develop branch
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: https://dev.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar-${{ github.ref_name }}-${{ github.run_number }}
          path: ./artifacts

      - name: Deploy to Dev Environment
        env:
          APP_ENV: ${{ secrets.DEV_APP_ENV }}
          APP_VERSION: ${{ secrets.APP_VERSION }}
          DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
        run: |
          echo "🚀 Deploying to DEVELOPMENT environment..."
          echo "   Environment : $APP_ENV"
          echo "   Version     : $APP_VERSION"
          echo "   Target Host : $DEPLOY_HOST"
          echo "   Branch      : ${{ github.ref_name }}"
          echo "   Commit      : ${{ github.sha }}"
          echo "✅ Dev deployment complete!"

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to PROD — only on main branch
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://prod.example.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar-${{ github.ref_name }}-${{ github.run_number }}
          path: ./artifacts

      - name: Deploy to Prod Environment
        env:
          APP_ENV: ${{ secrets.PROD_APP_ENV }}
          APP_VERSION: ${{ secrets.APP_VERSION }}
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          echo "   Environment : $APP_ENV"
          echo "   Version     : $APP_VERSION"
          echo "   Target Host : $DEPLOY_HOST"
          echo "   Branch      : ${{ github.ref_name }}"
          echo "   Commit      : ${{ github.sha }}"
          echo "✅ Production deployment complete!"

  # ─────────────────────────────────────────────
  # JOB 4: Feature branch — Build only, no deploy
  # ─────────────────────────────────────────────
  feature-build-only:
    name: Feature Branch - Build Only
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/heads/feature/')

    steps:
      - name: Feature Branch Notice
        run: |
          echo "ℹ️  Feature branch detected: ${{ github.ref_name }}"
          echo "   Build succeeded but deployment is SKIPPED for feature branches."
          echo "   Merge to develop or main to trigger a deployment."
